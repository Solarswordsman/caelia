<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabolic Phrase Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0b08;
    --bg2: #151008;
    --bg3: #1c1510;
    --border: rgba(180,130,60,0.18);
    --border2: rgba(180,130,60,0.35);
    --gold: #c9a84c;
    --gold-dim: #8a6e30;
    --red: #8b2020;
    --red-bright: #c23a3a;
    --text: #d4c4a0;
    --text-dim: #8a7a5a;
    --text-faint: #c9c9c9;
    --pill-bg: #1c1510;
    --pill-active: #2a1e0e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 20px;
    min-height: 100vh;
    line-height: 1.5;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border2);
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 1rem auto 0;
    opacity: 0.4;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.03em;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 2rem;
  }

  .pill {
    cursor: pointer;
    padding: 5px 14px;
    border-radius: 2px;
    border: 0.5px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--pill-bg);
    transition: all 0.15s ease;
    outline: none;
  }

  .pill:hover {
    border-color: var(--border2);
    color: var(--text);
  }

  .pill.active {
    background: var(--pill-active);
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .section {
    margin-bottom: 2rem;
    animation: fadein 0.2s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border2);
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .section-sub {
    font-size: 0.85rem;
    color: var(--text-faint);
    font-style: italic;
  }

  .col-head {
    display: grid;
    grid-template-columns: 46% 54%;
    padding: 0 0 3px;
    margin-bottom: 1px;
  }

  .ch {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 6px;
  }

  .entry {
    display: grid;
    grid-template-columns: 46% 54%;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }

  .entry:last-child { border-bottom: none; }

  .entry:hover {
    background: rgba(180,130,60,0.04);
  }

  .meaning {
    padding: 6px 10px 6px 6px;
    font-size: 0.92rem;
    color: var(--text);
    display: flex;
    align-items: center;
    line-height: 1.35;
    border-right: 0.5px solid var(--border);
  }

  .meaning-inner { display: flex; flex-direction: column; gap: 1px; }

  .meaning-quote { color: var(--text); }

  .meaning-usage {
    font-size: 0.78rem;
    color: var(--text-faint);
    font-style: italic;
    margin-top: 2px;
  }

  .phrase-block {
    padding: 6px 6px 6px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .phrase-main {
    font-family: 'Crimson Text', serif;
    font-weight: 600;
    font-size: 1rem;
    color: #e8d4a0;
    letter-spacing: 0.02em;
  }

  .phrase-alts {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
  }

  .alt-item {
    font-family: 'Crimson Text', serif;
    font-weight: 600;
    font-size: 1rem;
    color: #b89a5a;
    letter-spacing: 0.02em;
  }

  .alt-sep {
    color: var(--gold-dim);
    font-size: 0.55rem;
    padding: 0 7px;
    user-select: none;
    vertical-align: middle;
  }

  .ornament {
    text-align: center;
    color: var(--border2);
    font-size: 1.1rem;
    margin: 1.5rem 0 0;
    letter-spacing: 0.5em;
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Diabolic Phrases</h1>
    <p class="subtitle">quick reference — sorted by vibe</p>
  </header>

  <div class="filters" id="filters"></div>
  <div id="content"></div>
  <div class="ornament">· · ·</div>
</div>

<script>
const data = [
  {
    vibe: "Expletives & frustration",
    sub: "reflex curses, things slipping out",
    entries: [
      { meaning: '"Damn it!" — general frustration', main: "Us'maldra!", alts: "Usmaldra! / Us'mal!" },
      { meaning: '"For the love of—" / "get it together"', main: "Itor cael, itor cael…", alts: "It'cael… / Itorcael…" },
      { meaning: '"Son of a—!" — sharp shock or pain', main: "Nox erebi!", alts: "Nox'rebi! / Noxrebi!" },
      { meaning: '"Shit!" — pure reflex', main: "Mer'cinis!", alts: "Mercinis! / Mer'cin!" },
      { meaning: '"Ugh! I\'m an idiot." — self-directed mistake', main: "Vah! Stultus sum.", alts: "Vah! Stult'sum." },
      { meaning: '"Oh, gods below." — fond exasperation', main: "Oh, di inferi.", alts: "Oh, d'inferi. / Dinferi." },
      { meaning: '"Gods preserve me." — nun-taught; she hates that she still says it', main: "Di me servent.", alts: "Dime servent. / Dimserv." },
    ]
  },
  {
    vibe: "Dread & dark omens",
    sub: "quiet, cold, or foreboding",
    entries: [
      { meaning: '"Oh, this is bad." — quiet dread', main: "Malum ven'tis.", alts: "Mal'ventis. / Malventis." },
      { meaning: '"The devil\'s walking on us." — "we\'re cursed"', main: "Calcat'nos diabolus.", alts: "Calcat'nos. / Calnos." },
      { meaning: '"Into the fire, all of it." — "screw everything"', main: "In ignem omnia.", alts: "In'ignem omn. / Inignom." },
      { meaning: '"Pyre and ash." — "we\'re screwed / everything\'s ruined"', main: "Rogus et cinera.", alts: "Rogus'cinera." },
      { meaning: '"Hell give me patience." — exasperated, muttered', main: "Inferis da mihi patientiam.", alts: "Inferis, pat'iam." },
    ]
  },
  {
    vibe: "Warding & liturgy",
    sub: "childhood programming cracking through",
    entries: [
      { meaning: '"I\'m not calling on His name." — nervous warding', main: "Nomen eius non invoco.", alts: "Nomen non'voco." },
      { meaning: '"Save me, eternal law." — genuine fear, involuntary', main: "Serva me, lex aeterna.", alts: "Serva'me, lex." },
      { meaning: '"Away." / "Get away from me." — one word, heavy authority', main: "Apage.", alts: "—" },
      { meaning: '"Shut up, shut up, shut up." — said to herself when panicking', main: "Tace, tace, tace.", alts: "Tac'tac'tac." },
      { meaning: '"Go to hell." — dismissive, dangerous', main: "Sal'vitam te.", alts: "Salvitam. / Sal'tam." },
    ]
  },
  {
    vibe: "Combat taunts",
    sub: "deliberate, blood is up",
    entries: [
      { meaning: '"Come to me." — quiet, almost inviting. Terrifying.', main: "Veni ad me.", alts: "Ven'ad me. / Ven'adme!" },
      { meaning: '"You\'re already falling." — mid-fight, she\'s winning', main: "Cadens es.", alts: "Cad'nes. / Kaed'nas." },
      { meaning: '"You won\'t run." — a promise, not a taunt', main: "Non fugies.", alts: "Nof'gies. / Nofugis!" },
      { meaning: '"Your blood, my victory."', main: "Sanguis tuus, mea victoria.", alts: "San'tuis, mea vic." },
      { meaning: '"It\'s already over." — almost bored', main: "Iam finit.", alts: "Yam fin'it. / Yamfinit." },
      { meaning: '"The dark is coming for you." — slow, deliberate', main: "Nox venit pro te.", alts: "Nox ven'prote. / Noxvenprote." },
      { meaning: '"Dying is the easy part." — implied threat about what comes after', main: "Mori facilis est.", alts: "Mori fac'est. / Morfacest." },
    ]
  },
  {
    vibe: "Trash talk & mid-fight",
    sub: "muttered, frustrated, contemptuous",
    entries: [
      { meaning: '"Pathetic." / "Idiot." — spat out', main: "Imbecillis.", alts: "Im'beclis. / Embeclis!" },
      { meaning: '"Just fall already!" — fight dragging on', main: "Cade iam!", alts: "Kad'iam! / Kadjam!" },
      { meaning: '"Stupid, stupid." — muttered, almost pitying', main: "Stulte, stulte.", alts: "Stul'te. / Stult." },
      { meaning: '"A little unwise." — diplomatic for "that was dumb"', main: "Parum prudentis.", alts: "Par'prudis. / Parprudis." },
    ]
  },
  {
    vibe: "Ally praise",
    sub: "when someone lands a good hit",
    entries: [
      { meaning: '"Excellent!" — punchy, natural reflex', main: "Optime!", alts: "Op'time! / Optme!" },
      { meaning: '"Good hit." — short nod; high praise from her', main: "Bene ictum.", alts: "Ben'ictum. / Ben'ictm." },
      { meaning: '"That\'s it!" — excited, maybe a little surprised', main: "Hoc est!", alts: "Hoc'est! / H'cest!" },
      { meaning: '"Again! Again!" — blood\'s up, probably grinning', main: "Iterum! Iterum!", alts: "It'um! It'um!" },
      { meaning: '"Now he sees." — quiet, satisfied; the poetic one', main: "Iam videt.", alts: "Yam vid'et. / Yamvidet." },
    ]
  },
  {
    vibe: "Casual filler",
    sub: "slips out without thinking",
    entries: [
      { meaning: '"Good." / "Yeah." / "Okay." — constant all-purpose noise', main: "Bene.", alts: "—" },
      { meaning: '"Yes, yes." — half-listening, slightly exasperated', main: "Ita, ita.", alts: "It'a. / Itaita." },
      { meaning: '"So…" — thinking-out-loud filler', main: "Ergo…", alts: "—" },
      { meaning: '"What even is that?" — curiosity or mild disgust', main: "Quid hoc est?", alts: "Quidhoc? / Qu'hoc?" },
      { meaning: '"I don\'t know." — flat, honest', main: "Non scio.", alts: "Non'scio. / Noscio." },
      { meaning: '"Hold on." / "Just a moment."', main: "Paulisper.", alts: "Paus'per. / Pawsper." },
      { meaning: '"As I said." — slightly smug, said it twice already', main: "Ut dixi.", alts: "Ud'dixi. / Utdix." },
      { meaning: '"Again?" — one word, one eyebrow', main: "Iterum?", alts: "—" },
    ]
  },
  {
    vibe: "Awe & fearful wonder",
    sub: "when something is too big for normal words",
    entries: [
      { meaning: '"Oh… vast." — barely a word; she just trails off', main: "Vah... vastum.", alts: "Vah'vastum. / Vaaaastum." },
      { meaning: '"The sky is falling." — "everything just changed / I can\'t process this"', main: "Caelum ruit.", alts: "Cael'ruit. / Kaelrut." },
      { meaning: '"The dark… the dark does this?" — reverent dread at something that shouldn\'t exist', main: "Nox... nox hoc facit?", alts: "Nox hoc'facit? / Noxfacit?" },
      { meaning: '"Without a name." — it\'s beyond words. Said quietly, almost to herself.', main: "Sine nomine.", alts: "Sin'nomine. / Sinnomne." },
      { meaning: '"Monstrous." / "Immense." — terror OR awe depending on tone; whispered or exhaled', main: "Immane.", alts: "Im'mane. / Immaaane." },
      { meaning: '"Gods, what is this?" — full-body "what am I looking at"', main: "Dii, quid hoc est?", alts: "Di'quidhoc? / Diiq'hocest?" },
      { meaning: '"The deep dark." — for things that feel ancient or cosmically wrong-but-beautiful', main: "Erebi profundi.", alts: "Er'profundi. / Erebprofund." },
    ]
  },
  {
    vibe: "Warmth & friendship",
    sub: "genuine, though she'd never admit it",
    entries: [
      { meaning: '"Take care, friend." — real warmth wrapped in old nun-language', main: "Vale, amice.", alts: "Val'amce. / Val'am." },
      { meaning: '"You\'re right." — rare; lands hard when she says it', main: "Recte dicis.", alts: "Rec'dicis. / Rectdic." },
      { meaning: '"That\'s enough." / "We\'re good."', main: "Satis est.", alts: "Sat'est." },
      { meaning: '"Do what you want." — dignified surrender, done arguing', main: "Fac quod vis.", alts: "Facquodvis. / Fac'vis." },
    ]
  },
];

const filtersEl = document.getElementById('filters');
const contentEl = document.getElementById('content');
let active = 'all';

function render() {
  contentEl.innerHTML = '';
  const shown = active === 'all' ? data : data.filter(s => s.vibe === active);
  shown.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-head">
        <span class="section-title">${section.vibe}</span>
        <span class="section-sub">${section.sub}</span>
      </div>
      <div class="col-head">
        <span class="ch">Meaning / usage</span>
        <span class="ch">Phrase — alternates</span>
      </div>
      ${section.entries.map(e => {
        const dashIdx = e.meaning.indexOf(' — ');
        const quote = dashIdx !== -1 ? e.meaning.slice(0, dashIdx) : e.meaning;
        const usage = dashIdx !== -1 ? e.meaning.slice(dashIdx + 3) : '';
        const altsHtml = e.alts === '—' ? '<span class="alt-item" style="color:var(--text-faint)">—</span>' :
          e.alts.split(' / ').map((a, i, arr) =>
            `<span class="alt-item">${a}</span>${i < arr.length - 1 ? '<span class="alt-sep">◆</span>' : ''}`
          ).join('');
        return `
        <div class="entry">
          <div class="meaning"><div class="meaning-inner"><span class="meaning-quote">${quote}</span>${usage ? `<span class="meaning-usage">${usage}</span>` : ''}</div></div>
          <div class="phrase-block">
            <div class="phrase-main">${e.main}</div>
            <div class="phrase-alts">${altsHtml}</div>
          </div>
        </div>`;
      }).join('')}
    `;
    contentEl.appendChild(sec);
  });
}

function buildFilters() {
  const allPill = document.createElement('button');
  allPill.className = 'pill active';
  allPill.textContent = 'All';
  allPill.onclick = () => { active = 'all'; updatePills(); render(); };
  filtersEl.appendChild(allPill);

  data.forEach(s => {
    const p = document.createElement('button');
    p.className = 'pill';
    p.textContent = s.vibe;
    p.onclick = () => { active = s.vibe; updatePills(); render(); };
    filtersEl.appendChild(p);
  });
}

function updatePills() {
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.textContent === 'All' ? active === 'all' : p.textContent === active);
  });
}

buildFilters();
render();
</script>
</body>
</html>
